name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build universal macOS release
    runs-on: macos-14
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Validate release tag
        shell: bash
        run: |
          if [[ ! "$GITHUB_REF_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release tags must look like v1.2.3" >&2
            exit 1
          fi

      - name: Show Swift version
        run: swift --version

      - name: Run tests
        run: swift test

      - name: Build release artifacts
        env:
          VERSION: ${{ github.ref_name }}
          BUILD_NUMBER: ${{ github.run_number }}
        shell: bash
        run: |
          VERSION="${VERSION#v}" ./scripts/create-release-artifacts.sh

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          gh release create "$GITHUB_REF_NAME" \
            dist/release/* \
            --verify-tag \
            --title "Apple Music Lyrics ${GITHUB_REF_NAME#v}" \
            --generate-notes
